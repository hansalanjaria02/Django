<!DOCTYPE html>
<html>
<head>
    <title>Patient Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        form {
            width: 40%;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid black;
        }

        button {
            background: green;
            color: white;
            padding: 8px 15px;
            border: none;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Patient Form</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>

</body>
</html>
